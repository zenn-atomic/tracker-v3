<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Profil</title>

    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: Arial;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
      }

      .card {
        background: white;

        padding: 20px;

        border-radius: 20px;

        max-width: 400px;

        margin: auto;

        text-align: center;

        position: relative;
      }

      /* tombol kembali */

      .backBtn {
        position: absolute;

        left: 20px;
        top: 20px;

        font-size: 45px;

        cursor: pointer;

        font-weight: bold;

        color: #1e3c72;
      }

      /* foto */

      img {
        width: 120px;
        height: 120px;

        border-radius: 50%;

        object-fit: cover;

        margin-top: 20px;
        margin-bottom: 15px;
      }

      h2 {
        margin-bottom: 10px;
      }

      p {
        color: #555;
        margin-bottom: 20px;
      }

      /* sembunyikan choose file */

      #foto {
        display: none;
      }

      /* tombol upload modern */

      .uploadBtn {
        display: inline-block;

        padding: 12px 25px;

        background: #2a5298;

        color: white;

        border-radius: 30px;

        cursor: pointer;

        font-weight: bold;

        margin-bottom: 20px;

        transition: 0.3s;
      }

      .uploadBtn:active {
        transform: scale(0.95);
      }

      button {
        width: 100%;

        padding: 14px;

        margin-top: 10px;

        border: none;

        border-radius: 12px;

        color: white;

        font-weight: bold;

        font-size: 16px;

        cursor: pointer;
      }

      .save {
        background: #28a745;
      }

      .logout {
        background: red;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="backBtn" onclick="window.location.href = '../index.html'">
        ←
      </div>

      <img id="profilePic" src="../img/default-profile.png" />

      <h2 id="nama"></h2>

      <p id="email"></p>

      <label for="foto" class="uploadBtn"> Ganti Foto </label>

      <input id="foto" type="file" accept="image/*" />

      <button class="save" onclick="simpanFoto()">Simpan Foto</button>

      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <script>
      document.getElementById("nama").textContent =
        localStorage.getItem("userName");

      document.getElementById("email").textContent =
        localStorage.getItem("userEmail");

      if (localStorage.getItem("profileImage")) {
        document.getElementById("profilePic").src =
          localStorage.getItem("profileImage");
      }

      let fotoBaru = "";

      foto.onchange = (e) => {
        let file = e.target.files[0];

        if (!file) return;

        let reader = new FileReader();

        reader.onload = function () {
          fotoBaru = this.result;

          document.getElementById("profilePic").src = fotoBaru;
        };

        reader.readAsDataURL(file);
      };

      function simpanFoto() {
        if (fotoBaru != "") {
          localStorage.setItem(
            "profileImage",

            fotoBaru,
          );

          alert("Foto tersimpan");
        }
      }

      function logout() {
        localStorage.removeItem("isLogin");

        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
